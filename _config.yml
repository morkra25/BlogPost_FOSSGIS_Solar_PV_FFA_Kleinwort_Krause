plugins:
  - jekyll-relative-links
  - jekyll-remote-theme
  
relative_links:
  enabled: true
  collections: true

include:
  - CONTRIBUTING.md
  - README.md
  - LICENSE.md
  - COPYING.md
  - CODE_OF_CONDUCT.md
  - ISSUE_TEMPLATE.md
  - PULL_REQUEST_TEMPLATE.md

title: [The title of your site]
description: [A short description of your site's purpose]

remote_theme: pages-themes/slate@v0.2.0
